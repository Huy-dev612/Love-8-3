<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi em ❤️</title>
<canvas id="fireworks"></canvas>
<style>

body{
    
    margin:0;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#201f1f,#fad0c4);
    font-family:sans-serif;
}
#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
/* ẢNH RƠI */

.falling{
    position:absolute;
    top:-150px;
    animation:fall linear infinite;
}

.falling img{
    width:110px;
    border-radius:15px;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* LÁ THƯ */

.letter{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    height:140px;
    background:white;
    border-radius:10px;
    display:flex;
    justify-content:center;
    text-align: center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    font-size:20px;
}

/* NỘI DUNG THƯ */

.message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    display:none;
    color:white;
    font-size:30px;
}

/* TRÁI TIM ĐẬP */

.heart{
    font-size:60px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    25%{transform:scale(1.2);}
    50%{transform:scale(1);}
    75%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
@keyframes fallHeart{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="letter"  onclick="openLetter()">
💌 Mời bé Phương mở thư
</div>

<div class="message" id="msg">
<div>
    Hãy để mặt trời mùa xuân làm tan băng tuyết.
Hãy để nó mang lại hạnh phúc, niềm vui và ánh sáng cho trái tim của em,
Hãy để nó mang lại nhiều tình yêu cho em❤️
Chúc em 8/3 vui vẻ ❤️</div>
<div class="heart">❤️</div>
</div>

<script>

/* DANH SÁCH ẢNH */

const images = [
"images/1.jpg",
"images/2.jpg",
"images/3.jpg",
"images/4.jpg",
"images/5.jpg",
"images/6.jpg",
"images/7.jpg",
"images/8.jpg",
"images/9.jpg",
"images/10.jpg",
"images/11.jpg",
"images/12.jpg",
"images/13.jpg",
"images/14.jpg",
"images/15.jpg",
"images/16.jpg",
"images/17.jpg",
"images/18.jpg",
"images/19.jpg",
"images/20.jpg"
];

function createImage(){

const box=document.createElement("div");
box.className="falling";

const img=document.createElement("img");

img.src=images[Math.floor(Math.random()*images.length)];

box.appendChild(img);

box.style.left=Math.random()*100+"vw";
box.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(box);

setTimeout(()=>{box.remove()},10000);
}

setInterval(createImage,500);

function createHeart(){

const heart=document.createElement("div");

heart.innerHTML="💗";
heart.style.position="absolute";
heart.style.top="-20px";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";
heart.style.animation="fallHeart linear";
heart.style.animationDuration=(Math.random()*4+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,200);
/* MỞ THƯ */

function openLetter(){

document.querySelector(".letter").style.display="none";
document.getElementById("msg").style.display="block";

setInterval(createFirework,1200);

}
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

function heartShape(t){
return {
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

function createFirework(){

let startX=Math.random()*canvas.width;
let startY=Math.random()*canvas.height*0.6;

for(let i=0;i<80;i++){

let t=Math.random()*Math.PI*2;
let pos=heartShape(t);

particles.push({
x:startX,
y:startY,
vx:pos.x*0.5,
vy:pos.y*0.5,
life:100
});

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="pink";
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();

if(p.life<=0){
particles.splice(i,1);
}

});

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
